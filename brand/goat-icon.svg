<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kady Youth Sheep Camp goat mark">
  <!-- Goat head emblem. Single color; set via `fill` on the root group. -->
  <g fill="#EDE3CC">
    <!-- Left horn (crescent) -->
    <path d="M50,50 C40,43 29,41 22,48 C15,55 14,64 21,71 C18,63 21,55 29,52 C37,49 45,52 50,56 Z"/>
    <!-- Right horn (mirror) -->
    <path d="M70,50 C80,43 91,41 98,48 C105,55 106,64 99,71 C102,63 99,55 91,52 C83,49 75,52 70,56 Z"/>
    <!-- Ears -->
    <path d="M41,58 C34,60 30,67 34,72 C38,70 43,65 44,60 Z"/>
    <path d="M79,58 C86,60 90,67 86,72 C82,70 77,65 76,60 Z"/>
    <!-- Face -->
    <path d="M47,48 C43,53 41,59 43,67 C44,76 49,86 60,94 C71,86 76,76 77,67 C79,59 77,53 73,48 C68,45 52,45 47,48 Z"/>
    <!-- Beard tuft -->
    <path d="M55,90 C56,101 58,108 60,108 C62,108 64,101 65,90 C63,93 57,93 55,90 Z"/>
  </g>
  <!-- Eyes + nose punched in background color -->
  <g fill="#122634">
    <ellipse cx="52.5" cy="65" rx="2.4" ry="3.2"/>
    <ellipse cx="67.5" cy="65" rx="2.4" ry="3.2"/>
    <path d="M57,79 C57,82 63,82 63,79 C62,81 58,81 57,79 Z"/>
  </g>
</svg>
